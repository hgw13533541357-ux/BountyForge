name: BountyForge Scan
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to scan (comma-separated)'
        required: false
        default: 'polar,gitcoin'
      max_results:
        description: 'Max results per platform'
        required: false
        default: '50'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: 🔍 Multi-Platform Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 🔧 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: 📌 Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🔍 Run scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python bountyforge.py scan --platforms ${{ inputs.platforms || 'polar,gitcoin' }} --max ${{ inputs.max_results || '50' }}
      
      - name: 📄 Upload report
        uses: actions/upload-artifact@v4
        with:
          name: scan-report
          path: output/
          retention-days: 14
